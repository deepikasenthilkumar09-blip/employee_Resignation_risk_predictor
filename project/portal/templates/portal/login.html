{% extends 'portal/base.html' %}
{% load bootstrap4 %}

{% block login %}
<div class="container-fluid vh-100 d-flex align-items-center justify-content-center bg-dark">
    <div class="col-md-4 col-lg-3">
        <div class="glass-card p-5 animate-fade">
            <div class="text-center mb-5">
                <i class="fas fa-shield-alt fa-3x text-primary mb-3"></i>
                <h2 class="text-white">HR Portal Login</h2>
                <p class="text-muted">Enter credentials to access dashboard</p>
            </div>
            <form method="post">
                {% csrf_token %}
                {% bootstrap_form form %}
                <button type="submit" class="btn btn-primary w-100 py-2 mt-4">
                    Sign In <i class="fas fa-sign-in-alt ms-2"></i>
                </button>
            </form>
            <div class="mt-4 text-center small text-muted">
                Don't have an account? Contact IT Support.
            </div>
        </div>
    </div>
</div>
{% endblock %}
